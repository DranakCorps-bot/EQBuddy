# Attaches a self-contained linux-x64 build of the Avalonia app to every GitHub
# release (issue #4). The Linux UI may trail the Windows app by a few releases —
# see the release notes and issue tracker for its current parity level.
name: Linux release asset

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Avalonia linux-x64 (self-contained)
        run: >
          dotnet publish src/EQBuddy.Avalonia/EQBuddy.Avalonia.csproj -c Release
          -r linux-x64 --self-contained -p:PublishSingleFile=true
          -o publish-linux

      - name: Package
        run: |
          cp README.md docs/FeatureGuide.md publish-linux/
          tar -czf EQBuddy-linux-x64.tar.gz -C publish-linux .

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" EQBuddy-linux-x64.tar.gz --clobber
