name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build solution (WPF + Avalonia + Core + tests)
        run: dotnet build EQBuddy.sln -c Release

      - name: Run tests
        run: dotnet test tests/EQBuddy.Tests/EQBuddy.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

  build-avalonia-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build Avalonia app + tests on Linux
        run: |
          dotnet build src/EQBuddy.Avalonia/EQBuddy.Avalonia.csproj -c Release
          dotnet test tests/EQBuddy.Tests/EQBuddy.Tests.csproj -c Release
